<!doctype html>
<html lang="pl">
  <head>

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

      href="https://fonts.googleapis.com/css2?family=Roboto:wght@100;400;500;700;900&display=swap"

  <body>
    <nav class="menu-nav">
      <div class="container">

                <a
                  class="menu-link"
                  onclick="goTo('supportme', 'krs')"
                  href="/supportme/krs"
                  >Przekaż
                  <img class="menu-icon" src="/media/menu-krs.webp" /><span
                    class="color-krs"
                  >
                    podatku</span
                  ></a
                >
                <a
                  class="menu-link"
                  onclick="goTo('supportme', 'foundation')"

                  <span class="color-foundation">fundację</span></a
                >
              </div>
            </div>
          </li>
          <li class="menu-li">
            <a href="mygallery" onclick="goTo('mygallery')" class="menu-link">

          </li>
          <li class="menu-li">
            <a href="/aboutme" onclick="goTo('aboutme')" class="menu-link"

            <a

          <li class="menu-li">
            <a href="/myprogress" onclick="goTo('myprogress')" class="menu-link"

            >
          </li>
          <li class="menu-li">
            <a href="/reallife" onclick="goTo('reallife')" class="menu-link"

            >
          </li>
          <li class="menu-li">
            <a href="/irecommend" onclick="goTo('irecommend')" class="menu-link"
              >warto&nbsp;polecić</a
            >
          </li>
          <li class="menu-li">
            <a href="/myprojects" onclick="goTo('myprojects')" class="menu-link"
              >strefa projektów WWW</a
            >
          </li>
        </ul>
      </div>

    <img src="/media/loader.webp" class="loader invisible" id="loader" />

    <main id="main-content" class="main"></main>
    <footer class="footer">
      <div class="container">
        <ul class="footer-ul">
          <li class="technology-li technology_html5">
            <img src="/media/tech-icons/html5.png" />
            <span class="technology-name">HTML5</span>
          </li>
          <li class="technology-li technology_css3">
            <img src="media/tech-icons/css3.png" />
            <span class="technology-name">CSS3</span>
          </li>
          <li class="technology_js technology-li">
            <img src="media/tech-icons/js.png" />
            <span class="technology-name">JavaScript</span>
          </li>

            <img src="media/tech-icons/github.png" />
            <span class="technology-name">GitHub</span>

              <a href="mailto:rpuszkin@gmail.com" class="contact-icon"

              <a href="http://www.linkedin.com/in/robert-puszkin-927b2028b/"
